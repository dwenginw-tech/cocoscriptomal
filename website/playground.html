<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground - CocoScript</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="playground.css">
</head>
<body>
    <nav>
        <div class="container">
            <div class="logo">CocoScript</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="docs.html">Docs</a></li>
                <li><a href="playground.html">Playground</a></li>
                <li><a href="https://github.com/dwenginw-tech/cocoscriptomal" target="_blank">GitHub</a></li>
            </ul>
        </div>
    </nav>

    <div class="playground-container">
        <div class="editor-panel">
            <div class="panel-header">
                <h3>Code</h3>
                <button id="runBtn" class="btn primary">Run</button>
            </div>
            <textarea id="editor" spellcheck="false">class Greeter {
    constructor(name) {
        this.name = name;
    }

    greet() {
        print("Hello, " + this.name + "!");
    }
}

let greeter = Greeter("World");
greeter.greet();</textarea>
        </div>

        <div class="output-panel">
            <div class="panel-header">
                <h3>Output</h3>
                <button id="clearBtn" class="btn secondary">Clear</button>
            </div>
            <pre id="output">Click "Run" to execute your code...</pre>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>CocoScript &copy; 2026 | MIT License</p>
        </div>
    </footer>

    <script src="playground.js"></script>
</body>
</html>
